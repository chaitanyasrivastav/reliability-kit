name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint • Test • Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Formatting ─────────────────────────────────────────────
      - name: Format check
        run: npm run format:check

      # ── Linting ────────────────────────────────────────────────
      - name: Lint
        run: npm run lint -- --max-warnings=0

      # ── Build ──────────────────────────────────────────────────
      - name: Build packages
        run: npm run build:packages

      # ── Tests + Coverage (100% enforced here) ──────────────────
      - name: Test (with coverage)
        run: npm run test:coverage

      # ── Pack (ensures npm package correctness) ─────────────────
      - name: Pack (smoke test for npm publish)
        run: npm run pack
